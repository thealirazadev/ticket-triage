version: 2
updates:
  # Python dependencies (pyproject.toml + uv.lock), grouped into one monthly PR.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      python:
        patterns:
          - "*"

  # GitHub Actions used by the CI workflow, grouped into one monthly PR.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
